# GitHub Actions workflow for FFT Color Customizer
# Builds and publishes the mod for Reloaded-II
# Based on the Reloaded-II template by Sewer56

# Produces:
#   - Build artifacts for testing (on every push)
#   - GitHub Release (on tag push)
#   - Automatic changelog generation
#   - Optional: NuGet package, GameBanana upload

name: Build and Publish FFT Color Customizer

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  PUBLISH_PATH: ./Publish
  PUBLISH_GITHUB_PATH: .
  PUBLISH_CHANGELOG_PATH: ./Publish/Changelog.md

  # Set RELOADEDIIMODS to current directory for build
  RELOADEDIIMODS: .

  # Determine if this is a release (tag push)
  IS_RELEASE: ${{ startsWith(github.ref, 'refs/tags/') }}
  RELEASE_TAG: ${{ github.ref_name }}

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write  # Need write permission to create releases
    defaults:
      run:
        shell: pwsh

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history for changelog
        submodules: 'recursive'

    - name: Setup .NET 8.0 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Setup Node.js (for changelog)
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Changelog Generator
      run: npm install -g auto-changelog

    - name: Generate Changelog
      run: |
        [System.IO.Directory]::CreateDirectory("$env:PUBLISH_PATH")
        if ($env:IS_RELEASE -eq 'true') {
            auto-changelog --sort-commits date --hide-credit --template keepachangelog --commit-limit false --starting-version "$env:RELEASE_TAG" --output "$env:PUBLISH_CHANGELOG_PATH"
        }
        else {
            auto-changelog --sort-commits date --hide-credit --template keepachangelog --commit-limit false --unreleased --output "$env:PUBLISH_CHANGELOG_PATH"
        }

    - name: Run Tests
      run: dotnet test FFTColorCustomizer.Tests.csproj --verbosity minimal --nologo /p:WarningLevel=0
      # continue-on-error: true  # Commented out - workflow will now fail if tests fail

    - name: Build and Package
      id: publish
      run: ./Publish.ps1

    # Independent assertion — even if Publish.ps1's own Verify-Package missed
    # something, this won't. Fails loud (workflow goes red) if the zip is
    # missing, empty, or doesn't contain the main DLL. Prevents shipping a
    # broken release like v3.0.7 ever again.
    - name: Verify Release Artifact
      run: |
        $zipName = '${{ steps.publish.outputs.zip }}'
        if (-not $zipName) { throw "Publish.ps1 did not emit a 'zip' output." }
        if (-not (Test-Path $zipName)) { throw "Expected zip not found: $zipName" }
        $sizeMB = [math]::Round((Get-Item $zipName).Length / 1MB, 2)
        if ($sizeMB -lt 5) { throw "Zip suspiciously small ($sizeMB MB) — built mod should be 25+ MB" }
        Add-Type -Assembly System.IO.Compression.FileSystem
        $z = [System.IO.Compression.ZipFile]::OpenRead((Resolve-Path $zipName))
        $hasMainDll = $z.Entries | Where-Object { $_.Name -eq 'FFTColorCustomizer.dll' } | Select-Object -First 1
        $z.Dispose()
        if (-not $hasMainDll) { throw "FFTColorCustomizer.dll missing from $zipName" }
        Write-Host "OK: $zipName ($sizeMB MB) contains FFTColorCustomizer.dll"

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: FFTColorCustomizer-${{ github.sha }}
        path: ${{ steps.publish.outputs.zip }}
        retention-days: 30

    - name: Upload Changelog
      uses: actions/upload-artifact@v4
      with:
        name: Changelog
        path: ${{ env.PUBLISH_CHANGELOG_PATH }}
        retention-days: 30

    - name: Create GitHub Release (on Tag)
      uses: softprops/action-gh-release@v2
      if: env.IS_RELEASE == 'true'
      with:
        name: FFT Color Customizer ${{ env.RELEASE_TAG }}
        body_path: ${{ env.PUBLISH_CHANGELOG_PATH }}
        files: ${{ steps.publish.outputs.zip }}
        draft: false
        prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}

  # Optional: Add test results comment on PR
  test-results:
    if: github.event_name == 'pull_request'
    runs-on: windows-latest
    needs: build
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET 8.0 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Run Tests with Coverage
      run: |
        dotnet test FFTColorCustomizer.Tests.csproj --logger "console;verbosity=detailed" --nologo /p:WarningLevel=0
      # continue-on-error: true  # Commented out - workflow will now fail if tests fail